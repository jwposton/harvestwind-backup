backup:
  # Inventory profile name (e.g. nixihost, oxford-mini) — shown in ntfy title/body
  profile: your-profile-name

  server:
    lock_timeout: 300
    staging_lock_wait_timeout: 10800
    staging_lock_poll_interval: 30

  borg:
    repo_path: /srv/backups/borg_repo   # borg create target; rclone sync source
    backup_path: /srv/backups/rsync       # client rsync staging; borg create source
    compression: lz4
    full_check: false
    cache_dir: /var/cache/borg
    prune: true
    retention:
      daily: 7
      weekly: 4
      monthly: 6
    # retention: false   # disable prune

  b2:
    bucket: your-bucket
    path: backups

  ntfy:
    enabled: true
    url: https://ntfy.harvestwind.org
    topic: backups
    notify_on:
      success: true
      failure: true
      warning: true
