name: Deploy Backup Agent

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout harvestwind-backup
        uses: actions/checkout@v4

      - name: Resolve platform repo
        id: platform
        run: |
          for candidate in \
            "${{ github.workspace }}/../platform" \
            "$HOME/HarvestWind/selfhosted/platform"; do
            if [ -f "${candidate}/playbooks/deploy_backup.yml" ]; then
              echo "dir=${candidate}" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          echo "Platform repo not found (need playbooks/deploy_backup.yml)"
          exit 1

      - name: Run Ansible deploy
        working-directory: ${{ steps.platform.outputs.dir }}
        env:
          BACKUP_REPO_PATH: ${{ github.workspace }}
        run: |
          ansible-playbook playbooks/deploy_backup.yml \
            -i inventory/hosts.yml \
            -e "backup_repo_path=${BACKUP_REPO_PATH}"
